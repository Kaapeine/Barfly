<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BarFly Settings</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 480px; margin: 40px auto; padding: 0 20px;
      background: #f9f9fb; color: #1c1c1e;
    }
    h1 { font-size: 1.4rem; font-weight: 600; margin-bottom: 24px; }
    label { display: block; font-weight: 500; margin-bottom: 6px; }
    input[type="number"] {
      width: 100%; padding: 8px 12px; font-size: 1rem;
      border: 1px solid #c7c7cc; border-radius: 8px;
    }
    .actions, .seed-actions { display: flex; gap: 8px; margin-top: 16px; }
    .seed-actions { margin-top: 8px; }
    hr { border: none; border-top: 1px solid #e5e5ea; margin: 24px 0; }
    button {
      padding: 8px 20px; font-size: 0.95rem; border: none; border-radius: 8px;
      cursor: pointer; font-weight: 500;
    }
    button.primary { background: #007aff; color: #fff; }
    button.primary:hover { background: #0062cc; }
    button.secondary { background: #e5e5ea; color: #1c1c1e; }
    button.secondary:hover { background: #d1d1d6; }
    button.danger { background: #ff3b30; color: #fff; }
    button.danger:hover { background: #d62d20; }
    button.caution { background: #ff9500; color: #fff; }
    button.caution:hover { background: #e08600; }
    #status { margin-top: 12px; font-size: 0.9rem; color: #34c759; }
  </style>
</head>
<body>
  <h1>BarFly</h1>

  <div style="margin-bottom: 24px;">
    <label style="display:flex; align-items:center; gap:12px; cursor:pointer;">
      <span style="font-weight:500;">Pause event handlers</span>
      <input type="checkbox" id="pause-toggle" style="width:20px; height:20px;" />
    </label>
    <p style="font-size:0.8rem; color:#8e8e93; margin:4px 0 0 28px;">
      When paused, BarFly ignores all bookmark changes — useful while seeding or bulk-editing.
    </p>
  </div>

  <form id="settings-form">
    <label for="capacity">Dynamic section capacity</label>
    <input id="capacity" type="number" min="1" value="10" />
    <div class="actions">
      <button type="submit" class="primary">Save</button>
      <button type="button" id="rebuild" class="secondary">Rebuild toolbar</button>
    </div>
  </form>
  <p id="status"></p>

  <hr />

  <details>
    <summary style="cursor:pointer; font-weight:500; color:#555;">State</summary>
    <pre id="state-display" style="font-size:0.8rem; background:#f0f0f2; padding:12px; border-radius:8px; overflow-x:auto; margin-top:8px;">Loading...</pre>
  </details>

  <hr />

  <h2>Test tools</h2>
  <div class="seed-actions">
    <button type="button" id="seed" class="caution">Seed test bookmarks</button>
    <button type="button" id="clear-all" class="danger">Clear all bookmarks</button>
    <button type="button" id="reset" class="secondary">Reset BarFly</button>
  </div>
  <p id="seed-status" style="font-size:0.85rem; color:#8e8e93; margin-top:8px;"></p>

  <script type="module" src="options.js"></script>
</body>
</html>
