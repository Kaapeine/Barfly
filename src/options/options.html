<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BarFly Settings</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 480px; margin: 40px auto; padding: 0 20px;
      background: #f9f9fb; color: #1c1c1e;
    }
    h1 { font-size: 1.4rem; font-weight: 600; margin-bottom: 24px; }
    label { display: block; font-weight: 500; margin-bottom: 6px; }
    input[type="number"] {
      width: 100%; padding: 8px 12px; font-size: 1rem;
      border: 1px solid #c7c7cc; border-radius: 8px;
    }
    .actions { display: flex; gap: 8px; margin-top: 16px; }
    button {
      padding: 8px 20px; font-size: 0.95rem; border: none; border-radius: 8px;
      cursor: pointer; font-weight: 500;
    }
    button.primary { background: #007aff; color: #fff; }
    button.primary:hover { background: #0062cc; }
    button.secondary { background: #e5e5ea; color: #1c1c1e; }
    button.secondary:hover { background: #d1d1d6; }
    #status { margin-top: 12px; font-size: 0.9rem; color: #34c759; }
  </style>
</head>
<body>
  <h1>BarFly</h1>
  <form id="settings-form">
    <label for="capacity">Dynamic section capacity</label>
    <input id="capacity" type="number" min="1" value="10" />
    <div class="actions">
      <button type="submit" class="primary">Save</button>
      <button type="button" id="rebuild" class="secondary">Rebuild toolbar</button>
    </div>
  </form>
  <p id="status"></p>
  <script src="options.js"></script>
</body>
</html>
